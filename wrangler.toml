name = "create-story-worker"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

# Durable Objects
[durable_objects]
bindings = [
  { name = "STORY_COORDINATOR", class_name = "StoryCoordinator" }
]

[[migrations]]
tag = "v1"
new_classes = ["StoryCoordinator"]

# KV Namespace for job status caching
# Create with: wrangler kv:namespace create "JOB_STATUS_CACHE"
# Then copy the ID below
[[kv_namespaces]]
binding = "JOB_STATUS_CACHE"
id = "87a23a992ccf4af188aac9c8f13df792"
preview_id = "3a7a9647619a4c3980543c59581769f2"

[env.staging]
name = "create-story-worker-staging"
workers_dev = true
preview_urls = true

# Durable Objects for staging
[env.staging.durable_objects]
bindings = [
  { name = "STORY_COORDINATOR", class_name = "StoryCoordinator" }
]

# KV Namespace for staging (create with: wrangler kv:namespace create "JOB_STATUS_CACHE" --env staging)
[[env.staging.kv_namespaces]]
binding = "JOB_STATUS_CACHE"
id = "fd96067160f045aaae3a1d46cbe1d7e6"
preview_id = "25267f389b0b4d5f8a45f356c364f9ce"

# R2 Bucket bindings for staging
[[env.staging.r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "images"
preview_bucket_name = "images"

[[env.staging.r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "audio"
preview_bucket_name = "audio"

[[env.staging.r2_buckets]]
binding = "VIDEO_BUCKET"
bucket_name = "videos"
preview_bucket_name = "videos"

# Queue for async processing in staging
# Note: Tier-based concurrency is managed in code via concurrency-manager.ts
# These settings are baseline - actual concurrency per user is controlled by tier
[[env.staging.queues.producers]]
queue = "story-processing-staging"
binding = "STORY_QUEUE"

[[env.staging.queues.producers]]
queue = "webhook-processing-staging"
binding = "WEBHOOK_QUEUE"

# Dead Letter Queue for staging - cost effective with 7 day retention (Cloudflare default)
[[env.staging.queues.producers]]
queue = "story-dlq-staging"
binding = "STORY_DLQ"

[[env.staging.queues.consumers]]
queue = "story-processing-staging"
max_batch_size = 15           # Supports up to tier4 batch size
max_batch_timeout = 20        # Process every 20 seconds or when batch fills
max_concurrency = 20          # Overall worker concurrency (tier limits applied in code)
max_retries = 3               # Retry 3 times before sending to DLQ
dead_letter_queue = "story-dlq-staging"

[[env.staging.queues.consumers]]
queue = "webhook-processing-staging"
max_batch_size = 10
max_batch_timeout = 5
max_concurrency = 10
max_retries = 3
dead_letter_queue = "story-dlq-staging"

# DLQ Consumer - processes permanently failed messages
[[env.staging.queues.consumers]]
queue = "story-dlq-staging"
max_batch_size = 10
max_batch_timeout = 30
max_concurrency = 5

[env.staging.vars]
TIER1_CONCURRENCY = 2
TIER1_BATCH_SIZE = 3
TIER1_PRIORITY = 1
TIER2_CONCURRENCY = 5
TIER2_BATCH_SIZE = 5
TIER2_PRIORITY = 2
TIER3_CONCURRENCY = 10
TIER3_BATCH_SIZE = 10
TIER3_PRIORITY = 3
TIER4_CONCURRENCY = 20
TIER4_BATCH_SIZE = 15
TIER4_PRIORITY = 4
AI_METER_INGEST_KEY = "521f3c05e8ce4deda8db78a14efa4587e32e191cb167f81a3914eb9f62497d04"
APP_URL = "https://artflicks.app"
USE_DAG_ENGINE = "true"  # Enable DAG-based execution in staging
GEN_PROVIDER = "real"
ENABLE_KV_CACHE = "true"  # Enable KV cache in staging for testing

[env.production]
name = "create-story-worker-production"
workers_dev = true
preview_urls = true

# Durable Objects for production
[env.production.durable_objects]
bindings = [
  { name = "STORY_COORDINATOR", class_name = "StoryCoordinator" }
]

# KV Namespace for production (create with: wrangler kv:namespace create "JOB_STATUS_CACHE" --env production)
[[env.production.kv_namespaces]]
binding = "JOB_STATUS_CACHE"
id = "REPLACE_WITH_PRODUCTION_KV_NAMESPACE_ID"
preview_id = "81ec9c0eba7741f5b20d276149d4ae19"

# R2 Bucket bindings for production
[[env.production.r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "images"
preview_bucket_name = "images"

[[env.production.r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "audio"
preview_bucket_name = "audio"

[[env.production.r2_buckets]]
binding = "VIDEO_BUCKET"
bucket_name = "videos"
preview_bucket_name = "videos"

# Queue for async processing in production
# Note: Tier-based concurrency is managed in code via concurrency-manager.ts
# These settings are baseline - actual concurrency per user is controlled by tier
[[env.production.queues.producers]]
queue = "story-processing-production"
binding = "STORY_QUEUE"

[[env.production.queues.producers]]
queue = "webhook-processing-production"
binding = "WEBHOOK_QUEUE"

# Dead Letter Queue for production - cost effective with 7 day retention (Cloudflare default)
[[env.production.queues.producers]]
queue = "story-dlq-production"
binding = "STORY_DLQ"

[[env.production.queues.consumers]]
queue = "story-processing-production"
max_batch_size = 15           # Supports up to tier4 batch size
max_batch_timeout = 20        # Process every 20 seconds or when batch fills
max_concurrency = 20          # Overall worker concurrency (tier limits applied in code)
max_retries = 3               # Retry 3 times before sending to DLQ
dead_letter_queue = "story-dlq-production"

[[env.production.queues.consumers]]
queue = "webhook-processing-production"
max_batch_size = 10
max_batch_timeout = 5
max_concurrency = 10
max_retries = 3
dead_letter_queue = "story-dlq-production"

# DLQ Consumer - processes permanently failed messages
[[env.production.queues.consumers]]
queue = "story-dlq-production"
max_batch_size = 10
max_batch_timeout = 30
max_concurrency = 5

[env.production.vars]
TIER1_CONCURRENCY = 2
TIER1_BATCH_SIZE = 3
TIER1_PRIORITY = 1
TIER2_CONCURRENCY = 5
TIER2_BATCH_SIZE = 5
TIER2_PRIORITY = 2
TIER3_CONCURRENCY = 10
TIER3_BATCH_SIZE = 10
TIER3_PRIORITY = 3
TIER4_CONCURRENCY = 20
TIER4_BATCH_SIZE = 15
TIER4_PRIORITY = 4
AI_METER_INGEST_KEY = "521f3c05e8ce4deda8db78a14efa4587e32e191cb167f81a3914eb9f62497d04"
APP_URL = "https://artflicks.app"
USE_DAG_ENGINE = "false"  # Uncomment to enable DAG in production
GEN_PROVIDER = "real"
ENABLE_KV_CACHE = "false"  # Disable KV cache in production initially, enable after staging testing

# Environment variables (set via wrangler secret put or dashboard)
[vars]
# Default top-level vars for local development (wrangler dev)
GEN_PROVIDER = "mock"  # Set to "mock" for testing without external APIs
TIER1_CONCURRENCY = 2
TIER1_BATCH_SIZE = 3
TIER1_PRIORITY = 1
TIER2_CONCURRENCY = 5
TIER2_BATCH_SIZE = 5
TIER2_PRIORITY = 2
TIER3_CONCURRENCY = 10
TIER3_BATCH_SIZE = 10
TIER3_PRIORITY = 3
TIER4_CONCURRENCY = 20
TIER4_BATCH_SIZE = 15
TIER4_PRIORITY = 4
AI_METER_INGEST_KEY = "521f3c05e8ce4deda8db78a14efa4587e32e191cb167f81a3914eb9f62497d04"
APP_URL = "https://artflicks.app"
ENABLE_KV_CACHE = "true"  # Enable KV cache in local development for testing

