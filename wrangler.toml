preview_bucket_name = "audio"

[[env.production.r2_buckets]]
binding = "VIDEO_BUCKET"
bucket_name = "videos"
preview_bucket_name = "videos"

# KV namespace for job status cache (production)
[[env.production.kv_namespaces]]
binding = "JOB_STATUS_CACHE"
id = "2b8fb9602f9541678913d26e522f002c"
preview_id = "81ec9c0eba7741f5b20d276149d4ae19"

# Queue for async processing in production
# Note: Tier-based concurrency is managed in code via concurrency-manager.ts
# These settings are baseline - actual concurrency per user is controlled by tier
[[env.production.queues.producers]]
queue = "story-processing-production"
binding = "STORY_QUEUE"

[[env.production.queues.producers]]
queue = "story-dlq-production"
binding = "STORY_DLQ"

[[env.production.queues.producers]]
queue = "webhook-processing-production"
binding = "WEBHOOK_QUEUE"

[[env.production.queues.consumers]]
queue = "story-processing-production"
dead_letter_queue = "story-dlq-production"
max_batch_size = 15           # Supports up to tier4 batch size
max_batch_timeout = 20        # Process every 20 seconds or when batch fills
max_concurrency = 20          # Overall worker concurrency (tier limits applied in code)

[[env.production.queues.consumers]]
queue = "webhook-processing-production"
max_batch_size = 10
max_batch_timeout = 5
max_concurrency = 10

[[env.production.queues.consumers]]
queue = "story-dlq-production"
max_batch_size = 10
max_batch_timeout = 30
max_concurrency = 1

[env.production.vars]
TIER1_CONCURRENCY = 2
TIER1_BATCH_SIZE = 3
TIER1_PRIORITY = 1
TIER2_CONCURRENCY = 5
TIER2_BATCH_SIZE = 5
TIER2_PRIORITY = 2
TIER3_CONCURRENCY = 10
TIER3_BATCH_SIZE = 10
TIER3_PRIORITY = 3
TIER4_CONCURRENCY = 20
TIER4_BATCH_SIZE = 15
TIER4_PRIORITY = 4
APP_URL = "https://artflicks.app"

