name = "create-story-worker"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

# Durable Objects
[durable_objects]
bindings = [
  { name = "STORY_COORDINATOR", class_name = "StoryCoordinator" }
]

# DO classes already exist in staging/production; migrations are no-op to avoid re-add/delete errors
[[migrations]]
tag = "v1"
new_classes = []
renamed_classes = []
deleted_classes = []

[[migrations]]
tag = "v2"
renamed_classes = []
deleted_classes = []

[env.staging]
name = "create-story-worker-staging"
workers_dev = true
preview_urls = true

# Durable Objects for staging
[env.staging.durable_objects]
bindings = [
  { name = "STORY_COORDINATOR", class_name = "StoryCoordinator" }
]

# R2 Bucket bindings for staging
[[env.staging.r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "images"
preview_bucket_name = "images"

[[env.staging.r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "audio"
preview_bucket_name = "audio"

[[env.staging.r2_buckets]]
binding = "VIDEO_BUCKET"
bucket_name = "videos"
preview_bucket_name = "videos"

# KV Namespace for staging (create with: wrangler kv:namespace create "JOB_STATUS_CACHE" --env staging)
[[env.staging.kv_namespaces]]
binding = "JOB_STATUS_CACHE"
id = "fd96067160f045aaae3a1d46cbe1d7e6"
preview_id = "25267f389b0b4d5f8a45f356c364f9ce"

# Queue for async processing in staging
# Note: Tier-based concurrency is managed in code via concurrency-manager.ts
# These settings are baseline - actual concurrency per user is controlled by tier
[[env.staging.queues.producers]]
queue = "story-processing-staging"
binding = "STORY_QUEUE"

[[env.staging.queues.producers]]
queue = "story-dlq-staging"
binding = "STORY_DLQ"

[[env.staging.queues.producers]]
queue = "webhook-processing-staging"
binding = "WEBHOOK_QUEUE"

[[env.staging.queues.consumers]]
queue = "story-processing-staging"
dead_letter_queue = "story-dlq-staging"
max_batch_size = 15           # Supports up to tier4 batch size
max_batch_timeout = 20        # Process every 20 seconds or when batch fills
max_concurrency = 20          # Overall worker concurrency (tier limits applied in code)

[[env.staging.queues.consumers]]
queue = "webhook-processing-staging"
max_batch_size = 10
max_batch_timeout = 5
max_concurrency = 10

[[env.staging.queues.consumers]]
queue = "story-dlq-staging"
max_batch_size = 10
max_batch_timeout = 30
max_concurrency = 1

[env.staging.vars]
TIER1_CONCURRENCY = 2
TIER1_BATCH_SIZE = 3
TIER1_PRIORITY = 1
TIER2_CONCURRENCY = 5
TIER2_BATCH_SIZE = 5
TIER2_PRIORITY = 2
TIER3_CONCURRENCY = 10
TIER3_BATCH_SIZE = 10
TIER3_PRIORITY = 3
TIER4_CONCURRENCY = 20
TIER4_BATCH_SIZE = 15
TIER4_PRIORITY = 4
APP_URL = "https://artflicks.app"

[env.production]
name = "create-story-worker-production"
workers_dev = true
preview_urls = true

# Durable Objects for production
[env.production.durable_objects]
bindings = [
  { name = "STORY_COORDINATOR", class_name = "StoryCoordinator" }
]

# R2 Bucket bindings for production
[[env.production.r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "images"
preview_bucket_name = "images"

[[env.production.r2_buckets]]
binding = "AUDIO_BUCKET"
